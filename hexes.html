<body>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js" , crossorigin="anonymous"></script>

  <style>@import url("hexes.css");</style>

  <script type="text/javascript">
    async function main() {
      let pyodide = await loadPyodide();
      let mountDir = "/mnt";
      pyodide.FS.mkdir(mountDir);
      pyodide.FS.mount(pyodide.FS.filesystems.IDBFS, { root: "d:/prj/hexes" }, mountDir);
      
      await  pyodide.loadPackage("micropip");
      const micropip = pyodide.pyimport("micropip");
      await micropip.install("../dist/hexes-0.1.0-py3-none-any.whl");
     
      let hexes = pyodide.pyimport("engine");
      console.log(hexes.__version__);
      hexes.main();
    }

    main();
  </script>

  <div id="main-frame">


    <canvas id="map-canvas" width="1920px" , height="1280px">
    </canvas>


    <!--- loading screen -->
    <div id="loading" style="position: absolute; top: 40%; left: 25%; width: 50%; height: 20%;">
      <div
        style="position: relative; width: 100%; height: 20%; background-color: tomato; text-align: center; font-size: xx-large; padding-top: 20px; border-radius: 15px;">
        <b>Loading...</b>
      </div>
    </div>


    <div id="console-bg">

      <div id="console-header">
        <label id="log-level-label">log level</label>
        <select id="log-level-picker">
          <option value="DEBUG">Debug</option>
          <option value="INFO" selected>Info</option>
          <option value="WARNING">Warning</option>
          <option value="ERROR">Error</option>
        </select>
      </div>

      <textarea id="console" readonly="true"></textarea>
      <textarea id="console-input"></textarea>

    </div>


  </div>



</body>
