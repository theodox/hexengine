<body>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js" , crossorigin="anonymous"></script>

  <style>
    @import url("hexes.css");
  </style>

  <script type="text/javascript">
    async function main() {
      let pyodide = await loadPyodide();
      let mountDir = "/mnt";
      pyodide.FS.mkdir(mountDir);
      pyodide.FS.mount(pyodide.FS.filesystems.IDBFS, { root: "d:/prj/hexes" }, mountDir);

      await pyodide.loadPackage("micropip");
      const micropip = pyodide.pyimport("micropip");
      await micropip.install("../dist/hexes-0.1.0-py3-none-any.whl");

      let hexes = pyodide.pyimport("hexengine.__main__");
      console.log(hexes.__version__);
      hexes.main();
    }

    main();
  </script>

  <div id="main-frame">
    <!--- map canvas and svg overlay --->
    <div id="map-container">
      <!--bitmap bg-->
      <img id="map-bg" src="resources/test_map.png" />
      <!--static bg overlay & hexes-->
      <canvas id="map-canvas" 
        data-hexsize="24" , 
        data-hexcolor="#33443344" , data-hexstroke="1" ,
        data-hexmargin="0"></canvas>
      <!--interactive svg overlay-->
      <svg id="map-svg"></svg>
      <svg id="map-units"></svg>
      <!--- loading screen -->
      <div id="loading">
          <b>Loading...</b>
      </div>
      <div id ="turn-display">
          <label id="turn-label">Turn:</label>
          <span id="turn-info">-----</span>
      </div>
    </div>
    <!--- end map --->

    <div id="console-bg">

      <div id="console-header">
        <label id="log-level-label">log level</label>
        <select id="log-level-picker">
          <option value="DEBUG">Debug</option>
          <option value="INFO" selected>Info</option>
          <option value="WARNING">Warning</option>
          <option value="ERROR">Error</option>
        </select>
         <textarea id="status-line"readonly="true"></textarea>
      </div>

      <textarea id="console" readonly="true"></textarea>
      <textarea id="console-input"></textarea>

    </div>  
    <!--- end console --->
   
  </div>
</body>
