<body>

 <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js", crossorigin="anonymous"></script>
  
  <script type="text/javascript">
    async function main() {
      let pyodide = await loadPyodide();
      let mountDir = "/mnt";
      pyodide.FS.mkdir(mountDir);
      pyodide.FS.mount(pyodide.FS.filesystems.IDBFS, { root: "d:/prj/hexes" }, mountDir);
      await pyodide.runPythonAsync(`  
        from pyodide.http import pyfetch
        response = await pyfetch("hexes.py")
        with open("hexes.py", "wb") as f:
            rb = await response.bytes()
            f.write(rb)
        
        response = await pyfetch("dev_console.py")
        with open("dev_console.py", "wb") as f:
            rb = await response.bytes()
            f.write(rb)        
    `);

      let hexes = pyodide.pyimport("hexes");
      console.log(hexes)
      hexes.main();
    }

    main();
  </script>

  <div id="output" style="background-color: darkgray; position: absolute; padding: 32px;">
    <canvas id="hexCanvas" width="1600px", height="900px" style="margin: 32px; border: 1px solid black; border-radius: 32px;"></canvas>
    <div id="loading" style="position: absolute; top: 40%; left: 25%; width: 50%; height: 20%;">
      <div style="position: relative; width: 100%; height: 20%; background-color: tomato; text-align: center; font-size: xx-large; padding-top: 20px; border-radius: 15px;">
        <b>Loading...</b>
      </div>
    </div>
        
    <div>
      <label>log level:</label>
      <select id="console_level_picker" style="position: relative; right: 0px;">
        <option value="DEBUG">Debug</option>
        <option value="INFO" selected>Info</option>
        <option value="WARNING">Warning</option>
        <option value="ERROR">Error</option>
      </select>
    </div>
      
    <div id="console" style="position: relative; top: 0%; height: 256px; background-color: lightgray; border: 1px solid black; padding: 8px; font-family: monospace; font-size: small; overflow: auto;">
  

      <textarea id="console_output" style="width: 100%; height: 100%; border: none; color: antiquewhite; background-color: rgb(0, 0, 0); resize: none;" readonly>

      </textarea>
  </div>

    

</body>
