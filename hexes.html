<body>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js" , crossorigin="anonymous"></script>

  <style>
    @import url("hexes.css");
  </style>

  <script type="text/javascript">
    async function main() {
      let pyodide = await loadPyodide();
      let mountDir = "/mnt";
      pyodide.FS.mkdir(mountDir);
      pyodide.FS.mount(pyodide.FS.filesystems.IDBFS, { root: "d:/prj/hexes" }, mountDir);

      await pyodide.loadPackage("micropip");
      const micropip = pyodide.pyimport("micropip");
      // Cache-bust so Pyodide fetches the latest wheel after rebuilds (bump when you change package code)
      await micropip.install("../dist/hexes-0.1.3-py3-none-any.whl?v=5");

      let hexes = pyodide.pyimport("hexengine.__main__");
      console.log(hexes.__version__);
      hexes.main();
    }

    main();
  </script>

  <div id="main-frame">
    <!--- map canvas and svg overlay --->
    <div id="map-container">
      <!-- Single CSS transform for bg + grid + overlays + units (see Map._apply_transform) -->
      <div id="map-world">
        <img id="map-bg" src="resources/test_map.png" />
        <canvas id="map-canvas" data-hexsize="24" , data-hexcolor="#33443344" , data-hexstroke="1" ,
          data-hexmargin="0"></canvas>
        <canvas id="map-terrain"></canvas>
        <svg id="map-svg"></svg>
        <svg id="map-units"></svg>
      </div>

      <!--- loading screen -->
      <div id="loading">
        <b>Loading...</b>
      </div>

      <!--- advance turn button --->
      <div id = "advance">
        <button id="advance-button">Advance Turn</button>
      </div>
      <!--- ui overlay --->
      <div id="ui-panel">
        <div id="turn-display">
          <label id="turn-label">Turn:</label>
          <span id="turn-info">-----</span>
        </div>
        <label id="terrain-overlay-label" class="map-ui-toggle">
          <input type="checkbox" id="terrain-overlay-toggle" checked />
          Terrain tint
        </label>
      </div>
    </div>
    <!--- end map --->

    <div id="console-bg">

      <div id="console-header">
        <label id="log-level-label">log level</label>
        <select id="log-level-picker">
          <option value="DEBUG">Debug</option>
          <option value="INFO" selected>Info</option>
          <option value="WARNING">Warning</option>
          <option value="ERROR">Error</option>
        </select>
        <textarea id="status-line" readonly="true"></textarea>
      </div>

      <textarea id="console" readonly="true"></textarea>
      <textarea id="console-input"></textarea>

    </div>
    <!--- end console --->

  </div>
</body>
