# Canonical default scenario. Terrain + grid from Hextml import (resources/default/simple.gz)
# via tools/import_hextml_map.py. Co-bundled assets: dummy.svg.
# [map].background: path relative to this file when the file exists; else site-root-relative.

name = "Test Scenario"
description = "Test scenario; terrain grid imported from Hextml simple export (8×6)."

[map]
hex_size = 24
hex_margin = 0
hex_stroke = 1
hex_color = "#33443344"
background = "resources/test_map.png"
unit_size_multiplier = 1.5
hex_columns = 8
hex_rows = 6

[[unit_graphics]]
type = "canuck"
svg_file = "dummy.svg"

[[squads]]
type = "canuck"
faction = "Red"
members = [
  { id = "Canuck1", position = [0, 0, 0] },
  { id = "Canuck2", position = [1, 0, -1] },
  { id = "Canuck3", position = [2, 0, -2] },
]

[[squads]]
type = "soldier"
faction = "Blue"
members = [
  { id = "Generic1", position = [7, 0, -7] },
  { id = "Generic2", position = [7, 1, -8] },
  { id = "Generic3", position = [7, 2, -9] },
]

[[terrain_groups]]
