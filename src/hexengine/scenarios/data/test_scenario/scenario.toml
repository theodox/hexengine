# Canonical default scenario. Terrain + grid from Hextml import (resources/default/simple.gz)
# via tools/import_hextml_map.py (odd-q offset → axial). Co-bundled assets: dummy.svg.
# [map].background: path relative to this file when the file exists; else site-root-relative.
# All ``position`` values are odd-q [col, row] (HexRowCol), not cube (i, j, k).

name = "Test Scenario"
description = "Test scenario; terrain grid imported from Hextml simple export (8×9 axial bounds)."

[map]
hex_size = 24
hex_margin = 0
hex_stroke = 1
hex_color = "#33443344"
terrain_overlay_line_color = "#33443344"
terrain_overlay_line_width = 2
background = "resources/test_map.png"
unit_size_multiplier = 1.5
hex_columns = 8
hex_rows = 9

[[unit_graphics]]
type = "canuck"
svg_file = "dummy.svg"

[[squads]]
type = "canuck"
faction = "Red"
members = [
  { id = "Canuck1", position = [0, 3] },
  { id = "Canuck2", position = [1, 3] },
  { id = "Canuck3", position = [2, 3] },
]

[[squads]]
type = "soldier"
faction = "Blue"
members = [
  { id = "Generic1", position = [7, 3] },
  { id = "Generic2", position = [7, 4] },
  { id = "Generic3", position = [7, 5] },
]

[[terrain_groups]]
terrain = "beach"
movement_cost = 1.5
assault_modifier = 0.0
ranged_modifier = 0.0
