# Canonical default scenario (only copy in the repo). Lives next to co-bundled assets
# such as dummy.svg. [map].background: path relative to this file is resolved when the file
# exists; otherwise values like resources/test_map.png are treated as site-root-relative.

name = "Test Scenario"
description = "A simple test scenario for the game."

[map]
hex_size = 24
hex_margin = 0
hex_stroke = 1
hex_color = "#33443344"
background = "resources/test_map.png"
unit_size_multiplier = 1.5
hex_columns = 17
hex_rows = 7

[[unit_graphics]]
type = "canuck"
svg_file = "dummy.svg"

[[squads]]
type = "canuck"
faction = "Red"
members = [
  { id = "Canuck1", position = [16, 4, -20] },
  { id = "Canuck2", position = [16, 5, -21] },
  { id = "Canuck3", position = [16, 6, -22] },
]

[[squads]]
type = "soldier"
faction = "Blue"
members = [
  { id = "Generic1", position = [7, 3, -10] },
  { id = "Generic2", position = [6, 4, -10] },
  { id = "Generic3", position = [8, 4, -12] },
]

[[locations]]
# Clamped j from 7 → 6 to fit hex_rows = 7 (j must be 0..6).
position = [7, 6, -13]
terrain = "forest"
movement_cost = 1.5
assault_modifier = 1.5
ranged_modifier = 1.5
block_los = true

