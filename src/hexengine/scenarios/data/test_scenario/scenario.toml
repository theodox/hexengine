# Canonical default scenario. Map/terrain from Hextml (resources/default/lowlands_testmap.gz)
# via tools/import_hextml_map.py --merge-into (odd-q offset → axial). Co-bundled: dummy.svg.
# [map].background: path relative to this file when the file exists; else site-root-relative.
# All ``position`` values are odd-q [col, row] (HexColRow), not cube (i, j, k).

name = "Test Scenario"
description = "Test scenario; lowlands Hextml map (32×18 odd-q grid), squads unchanged."

[map]
hex_size = 24
hex_margin = 0
hex_stroke = 1
hex_color = "#33443344"
terrain_overlay_line_color = "#33443344"
terrain_overlay_line_width = 2
background = "resources/test_map.png"
background_crop_to_map = true
unit_size_multiplier = 1.5
hex_columns = 32
hex_rows = 18

