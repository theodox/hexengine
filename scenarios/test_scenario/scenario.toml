# Scenario bundle: keep maps and other assets in this folder (e.g. assets/map.png).
# [map].background: path relative to this file is turned into a site URL (e.g.
# assets/map.png -> scenarios/test_scenario/assets/map.png). If that file does not
# exist, the value is used as-is (e.g. resources/test_map.png from project root).

name = "Test Scenario"
description = "A simple test scenario for the game."

[map]
hex_size = 24
hex_margin = 0
hex_stroke = 1
hex_color = "#33443344"
background = "resources/test_map.png"
unit_size_multiplier = 1.5

[[squads]]
type = "canuck"
faction = "Red"
members = [
  { id = "Canuck1", position = [16, 4, -20] },
  { id = "Canuck2", position = [16, 5, -21] },
  { id = "Canuck3", position = [16, 6, -22] },
]

